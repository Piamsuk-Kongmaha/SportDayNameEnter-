<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลกีฬาสี</title>
    <style>
        :root {
            --red: #ff4d4d; --blue: #4d94ff;
            --green: #4dff88; --yellow: #ffff4d;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 600px; transition: max-width 0.3s; }
        .card.wide { max-width: 850px; }
        .hidden { display: none; }
        
        .login-container { text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        button.btn-primary { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        button#submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; margin-top: 15px; font-weight: bold; }
        button#submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #status, #login-error { margin-top: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        #login-error { color: red; }
        .student-preview { background: #e9ecef; padding: 12px; border-radius: 6px; margin-bottom: 10px; min-height: 40px; border-left: 5px solid #6c757d; }

        .admin-box { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        
        /* สไตล์ช่องค้นหาบน Dashboard */
        .search-container { background: #f8f9fa; border: 1px solid #e3e6f0; padding: 12px; border-radius: 6px; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.95rem; display: block; }

        /* แดชบอร์ด */
        .dashboard-container { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }
        .dashboard-title { font-size: 1.3rem; font-weight: bold; color: #444; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .dashboard-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.95rem; }
        .dashboard-table th, .dashboard-table td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .dashboard-table th { background-color: #f8f9fa; color: #333; font-weight: bold; }
        .dashboard-table tr:nth-child(even) { background-color: #fdfdfd; }
        .badge-level { padding: 3px 8px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; color: white; }
        .badge-j { background-color: #17a2b8; }
        .badge-s { background-color: #6f42c1; }
        .no-data { text-align: center; color: #888; padding: 20px; font-style: italic; }
        .refresh-btn { background: #6c757d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        
        /* ปุ่มลบรายชื่อ */
        .btn-delete { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-delete:hover { background: #bd2130; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="page-login" class="login-container">
        <h2>เข้าสู่ระบบกีฬาสี</h2>
        <p style="color: #666;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบข้อมูล</p>
        
        <input type="password" id="color-password" placeholder="กรอกรหัสผ่านที่นี่..." style="text-align: center;">
        <button class="btn-primary" onclick="checkPassword()">เข้าสู่ระบบ</button>
        <div id="login-error"></div>
    </div>

    <div id="page-entry" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:#007bff; cursor:pointer; padding:0; font-size: 1rem;">← ออกจากระบบ</button>
        <h2 id="form-title" style="margin-top: 10px;">บันทึกข้อมูล</h2>
        
        <div id="admin-color-selection" class="admin-box hidden">
            <label style="margin-top:0; color:#856404;">👑 สิทธิ์แอดมิน: กรุณาเลือกสีที่ต้องการจัดการ</label>
            <select id="admin-select-color" onchange="adminChangeColor()">
                <option value="" disabled selected>-- เลือกสีคณะ --</option>
                <option value="Red|สีแดง">สีแดง (Red)</option>
                <option value="Blue|สีน้ำเงิน">สีน้ำเงิน (Blue)</option>
                <option value="Green|สีเขียว">สีเขียว (Green)</option>
                <option value="Yellow|สีเหลือง">สีเหลือง (Yellow)</option>
            </select>
        </div>

        <label>เลขประจำตัวนักเรียน</label>
        <input type="number" id="student-id" placeholder="พิมพ์เลขประจำตัวที่นี่..." oninput="lookupStudent()">
        
        <label>ข้อมูลนักเรียนที่พบ</label>
        <div class="student-preview" id="preview-name">กรุณาพิมพ์เลขประจำตัวนักเรียน...</div>

        <label>ชนิดกีฬา</label>
        <select id="sport-name">
            <option value="FootBall">ฟุตบอล (FootBall)</option>
            <option value="BasketBall">บาสเกตบอล (BasketBall)</option>
            <option value="Badminton">แบดมินตัน (Badminton)</option>
            <option value="PingPong">ปิงปอง (Table Tennis)</option>
            <option value="Chairball">แชร์บอล (Chairball)</option>
            <option value="Volleyball">วอลเลย์บอล (Volleyball)</option>
            <option value="Marathon">วิ่งมาราธอน (Marathon)</option>
            <option value="Tech">เทคนิคกีฬา</option>
        </select>

        <button id="submit-btn" onclick="submitData()">บันทึกข้อมูล</button>
        <div id="status"></div>

        <div class="dashboard-container">
            <div class="dashboard-title">
                <span id="dashboard-header">📊 รายชื่อนักกีฬา</span>
                <button class="refresh-btn" onclick="refreshDashboard()">🔄 อัปเดตตาราง</button>
            </div>
            
            <div id="admin-search-box" class="search-container hidden">
                <input type="text" id="dashboard-search" class="search-input" placeholder="🔍 ค้นหาด้วย เลขประจำตัว, ชื่อ หรือชนิดกีฬา..." oninput="filterDashboard()">
            </div>

            <div style="overflow-x:auto;">
                <table class="dashboard-table">
                    <thead>
                        <tr>
                            <th>ชนิดกีฬา</th>
                            <th>ระดับ</th>
                            <th>เลขประจำตัว</th>
                            <th>ชื่อ - นามสกุล</th>
                            <th>ชั้น</th>
                            <th id="th-manage" class="hidden">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="dashboard-body">
                        <tr>
                            <td colspan="6" class="no-data">กรุณาเลือกสีคณะเพื่อดูแดชบอร์ด...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>

</body>
</html>
