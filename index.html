<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Sports Entry</title>
    <style>
        :root {
            --red: #ff4d4d; --blue: #4d94ff;
            --green: #4dff88; --yellow: #ffff4d;
        }
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .hidden { display: none; }
        
        /* Color Selection Grid */
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-color { border: none; height: 100px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: transform 0.2s; }
        .btn-color:hover { transform: scale(1.05); }
        .red { background: var(--red); } .blue { background: var(--blue); }
        .green { background: var(--green); } .yellow { background: var(--yellow); }

        /* Form Styling */
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button#submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; }
        #status { margin-top: 10px; font-weight: bold; text-align: center; }
        .student-preview { background: #e9ecef; padding: 10px; border-radius: 6px; margin-bottom: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="page-color">
        <h2 style="text-align: center;">Select Your Team Color</h2>
        <div class="color-grid">
            <button class="btn-color red" onclick="selectColor('Red')">RED</button>
            <button class="btn-color blue" onclick="selectColor('Blue')">BLUE</button>
            <button class="btn-color green" onclick="selectColor('Green')">GREEN</button>
            <button class="btn-color yellow" onclick="selectColor('Yellow')">YELLOW</button>
        </div>
    </div>

    <div id="page-entry" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:blue; cursor:pointer; padding:0;"><- Back</button>
        <h2 id="form-title">Key In Data</h2>
        
        <label>Student Number</label>
        <input type="number" id="student-id" placeholder="Ex: 12345" oninput="lookupStudent()">
        
        <div class="student-preview" id="preview-name">Waiting for Student ID...</div>

        <label>Sport</label>
        <select id="sport-name">
            <option value="FootBall">FootBall</option>
            <option value="BasketBall">BasketBall</option>
            <option value="Badminton">Badminton</option>
            <option value="PingPong">PingPong</option>
            <option value="Chairball">Chairball</option>
            <option value="Volleyball">Volleyball</option>
        </select>

        <button id="submit-btn" onclick="submitData()">Save Data</button>
        <div id="status"></div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4lZGNaNs_HkPkKBzHSiCBGpLYsSpT4EquNvvaGwj2KVURkmqZusaydRExi88lUr0w/exec"; 
    let selectedColor = "";
    let currentStudent = null;
    let searchTimer; // Timer for debouncing

    function selectColor(color) {
        selectedColor = color;
        document.getElementById('page-color').classList.add('hidden');
        document.getElementById('page-entry').classList.remove('hidden');
        document.getElementById('form-title').innerText = `${color} Team Entry`;
        document.getElementById('form-title').style.color = color === 'Yellow' ? '#b8b800' : color;
    }

    // This waits for the user to stop typing (Fast & Efficient)
    function lookupStudent() {
        clearTimeout(searchTimer);
        const id = document.getElementById('student-id').value;
        const preview = document.getElementById('preview-name');

        if (id.length < 3) {
            preview.innerText = "Enter at least 3 digits...";
            return;
        }

        preview.innerText = "Searching...";
        
        // Wait 500ms after last keystroke before calling Google
        searchTimer = setTimeout(async () => {
            try {
                const response = await fetch(`${SCRIPT_URL}?id=${id}`);
                const data = await response.json();
                
                if (data.status === "success") {
                    currentStudent = data;
                    preview.innerHTML = `<span style="color:green">✔ Found:</span> <strong>${data.name}</strong> (Grade ${data.grade})`;
                } else {
                    currentStudent = null;
                    preview.innerHTML = `<span style="color:red">✘ Student not found in MasterList</span>`;
                }
            } catch (e) {
                preview.innerText = "Connection error. Check script URL.";
            }
        }, 500); 
    }

    async function submitData() {
        if (!currentStudent) {
            alert("Please enter a valid Student ID first!");
            return;
        }
        
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status');
        const sport = document.getElementById('sport-name').value;
        
        btn.disabled = true;
        btn.innerText = "Saving...";

        const payload = {
            id: document.getElementById('student-id').value,
            name: currentStudent.name,
            grade: currentStudent.grade,
            sport: sport,
            color: selectedColor
        };

        try {
            // Using "no-cors" can sometimes hide errors, 
            // but your Google Script handles the response now.
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", 
                cache: "no-cache",
                body: JSON.stringify(payload)
            });

            // SUCCESS LOGIC
            status.innerHTML = `<span style="color:green">✅ Saved to ${sport} - ${selectedColor}!</span>`;
            
            // CLEAR FORM ONLY (Keep the color/page)
            document.getElementById('student-id').value = "";
            document.getElementById('preview-name').innerText = "Waiting for next Student ID...";
            currentStudent = null;
            
            // Clear success message after 3 seconds
            setTimeout(() => { status.innerText = ""; }, 3000);

        } catch (e) {
            status.innerHTML = `<span style="color:red">❌ Error saving. Check Internet.</span>`;
        }
        btn.disabled = false;
        btn.innerText = "Save Data";
    }
</script>

</body>
</html>
