<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกข้อมูลกีฬาสี</title>
    <style>
        :root {
            --red: #ff4d4d; --blue: #4d94ff;
            --green: #4dff88; --yellow: #ffff4d;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .hidden { display: none; }
        
        /* สไตล์หน้าล็อกอินด้วยรหัสผ่าน */
        .login-container { text-align: center; }
        
        /* การจัดรูปแบบฟอร์มทั่วไป */
        label { font-weight: bold; display: block; margin-top: 15px; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        
        button.btn-primary { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
        button#submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem; margin-top: 15px; font-weight: bold; }
        button#submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #status, #login-error { margin-top: 15px; font-weight: bold; text-align: center; font-size: 1.1rem; }
        #login-error { color: red; }
        .student-preview { background: #e9ecef; padding: 12px; border-radius: 6px; margin-bottom: 10px; min-height: 40px; border-left: 5px solid #6c757d; }
    </style>
</head>
<body>

<div class="card">
    <div id="page-login" class="login-container">
        <h2>เข้าสู่ระบบกีฬาสี</h2>
        <p style="color: #666;">กรุณากรอกรหัสผ่านของสีคณะเพื่อเข้าสู่หน้ากรอกข้อมูล</p>
        
        <input type="password" id="color-password" placeholder="กรอกรหัสผ่านสีคณะที่นี่..." style="text-align: center;">
        <button class="btn-primary" onclick="checkPassword()">เข้าสู่หน้ากรอกข้อมูล</button>
        <div id="login-error"></div>
    </div>

    <div id="page-entry" class="hidden">
        <button onclick="location.reload()" style="background:none; border:none; color:#007bff; cursor:pointer; padding:0; font-size: 1rem;">← ออกจากระบบสี</button>
        <h2 id="form-title" style="margin-top: 10px;">บันทึกข้อมูล</h2>
        
        <label>เลขประจำตัวนักเรียน</label>
        <input type="number" id="student-id" placeholder="พิมพ์เลขประจำตัวที่นี่..." oninput="lookupStudent()">
        
        <label>ข้อมูลนักเรียนที่พบ</label>
        <div class="student-preview" id="preview-name">กรุณาพิมพ์เลขประจำตัวนักเรียน...</div>

        <label>ชนิดกีฬา</label>
        <select id="sport-name">
            <option value="FootBall">ฟุตบอล (FootBall)</option>
            <option value="BasketBall">บาสเกตบอล (BasketBall)</option>
            <option value="Badminton">แบดมินตัน (Badminton)</option>
            <option value="PingPong">ปิงปอง (PingPong)</option>
            <option value="Chairball">แชร์บอล (Chairball)</option>
            <option value="Volleyball">วอลเลย์บอล (Volleyball)</option>
        </select>

        <button id="submit-btn" onclick="submitData()">บันทึกข้อมูล</button>
        <div id="status"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzzdPUds4cp882xpCAXCCAlmmRrCTTb9Dy5S7jpCbsZhO3yixyORfL2MFiEdePW1ktl/exec"; 
    
    const COLOR_PASSWORDS = {
        'red123': { name: 'Red', thName: 'สีแดง' },
        'blue123': { name: 'Blue', thName: 'สีน้ำเงิน' },
        'green123': { name: 'Green', thName: 'สีเขียว' },
        'yellow123': { name: 'Yellow', thName: 'สีเหลือง' }
    };

    let studentDatabase = []; 
    let selectedColor = "";
    let currentStudent = null;

    window.onload = async () => {
        try {
            const response = await fetch(`${SCRIPT_URL}?get=all`);
            studentDatabase = await response.json();
            console.log("โหลดฐานข้อมูลนักเรียนสำเร็จ!");
        } catch (e) {
            console.error("ไม่สามารถโหลดข้อมูลนักเรียนได้");
        }
    };

    // ฟังก์ชันตรวจสอบรหัสผ่านเพื่อเข้าหน้าสี
    function checkPassword() {
        const inputPass = document.getElementById('color-password').value.trim();
        const errorDiv = document.getElementById('login-error');
        
        if (COLOR_PASSWORDS[inputPass]) {
            errorDiv.innerText = "";
            selectedColor = COLOR_PASSWORDS[inputPass].name;
            const thName = COLOR_PASSWORDS[inputPass].thName;
            
            // สลับหน้าจอ
            document.getElementById('page-login').classList.add('hidden');
            document.getElementById('page-entry').classList.remove('hidden');
            
            // เปลี่ยนหัวข้อและสีตามที่ล็อกอินเข้ามา
            const title = document.getElementById('form-title');
            title.innerText = `ฟอร์มบันทึกข้อมูล - ${thName}`;
            title.style.color = selectedColor === 'Yellow' ? '#b8b800' : (selectedColor === 'Green' ? '#00802b' : selectedColor);
        } else {
            errorDiv.innerText = "❌ รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง";
        }
    }

    // ค้นหานักเรียนแบบเรียลไทม์
    function lookupStudent() {
        const id = document.getElementById('student-id').value;
        const preview = document.getElementById('preview-name');

        if (id.length < 3) {
            preview.innerHTML = "<span style='color:#666;'>กำลังรอเลขประจำตัว...</span>";
            currentStudent = null;
            return;
        }

        const student = studentDatabase.find(row => row[0].toString() === id);

        if (student) {
            const levelText = student[3] && student[3].toUpperCase() === 'J' ? 'ม.ต้น' : 'ม.ปลาย';
            currentStudent = { 
                name: student[1], 
                grade: student[2],
                level: student[3] || 'J' 
            };
            preview.innerHTML = `<span style="color:green; font-weight:bold;">✔ พบข้อมูล:</span><br>
                                 <strong>ชื่อ:</strong> ${student[1]}<br>
                                 <strong>ชั้น:</strong> ${student[2]} (${levelText})`;
        } else {
            currentStudent = null;
            preview.innerHTML = `<span style="color:red; font-weight:bold;">✘ ไม่พบเลขประจำตัวนี้ในระบบ</span>`;
        }
    }

    async function submitData() {
        if (!currentStudent) {
            alert("กรุณากรอกเลขประจำตัวนักเรียนให้ถูกต้องก่อนบันทึก!");
            return;
        }
        
        const btn = document.getElementById('submit-btn');
        const status = document.getElementById('status');
        const sport = document.getElementById('sport-name').value;
        
        btn.disabled = true;
        status.innerHTML = "<span style='color:orange;'>กำลังบันทึกข้อมูล...</span>";

        const payload = {
            id: document.getElementById('student-id').value,
            name: currentStudent.name,
            grade: currentStudent.grade,
            level: currentStudent.level, 
            sport: sport,
            color: selectedColor
        };

        try {
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });

            status.innerHTML = `<span style="color:green;">✅ บันทึกข้อมูลเรียบร้อยแล้ว!</span>`;
            
            // รีเซ็ตเฉพาะช่องกรอกข้อมูลนักเรียน (ยังคงล็อกอินอยู่ในหน้าสีเดิม)
            document.getElementById('student-id').value = "";
            document.getElementById('preview-name').innerHTML = "<span style='color:#666;'>กรุณาพิมพ์เลขประจำตัวนักเรียนคนถัดไป...</span>";
            currentStudent = null;
            
            setTimeout(() => { status.innerText = ""; }, 3000);
        } catch (e) {
            status.innerHTML = `<span style="color:red;">❌ เกิดข้อผิดพลาดในการเชื่อมต่ออินเทอร์เน็ต</span>`;
        }
        btn.disabled = false;
    }
</script>

</body>
</html>
